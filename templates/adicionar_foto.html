<!DOCTYPE html>
<html>
<head>
    <title>Sou Cidadão - Adicionar Foto</title>
    <style>
        body {
            background-color: #FFFFFF;
            color: #000080;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #000080;
        }
        .button {
            background-color: #006400;
            color: #FFFFFF;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin: 5px;
        }
        .button:hover {
            background-color: #004d00;
        }
        input[type="file"] {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Sou Cidadão</h1>
    <h2>Adicionar Foto (Opcional)</h2>
    <form method="POST" action="{{ url_for('adicionar_foto', solicitacao_id=solicitacao_id) }}" enctype="multipart/form-data">
        <input type="file" name="foto" accept="image/*"><br>
        <button type="submit" class="button">Enviar Foto e Continuar</button>
        <br>
        <a href="{{ url_for('confirmacao', solicitacao_id=solicitacao_id) }}"><button type="button" class="button">Pular</button></a>
    </form>
</body>
</html>
