<!DOCTYPE html>
<html>
<head>
    <title>Sou Cidadão - Preencher Dados</title>
    <style>
        body {
            background-color: #FFFFFF;
            color: #000080;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #000080;
        }
        .button {
            background-color: #006400;
            color: #FFFFFF;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin: 5px;
        }
        .button:hover {
            background-color: #004d00;
        }
        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #000080;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Sou Cidadão</h1>
    <h2>Preencha os Dados</h2>
    <form method="POST" action="{{ url_for('preencher_dados', vereador_email=vereador_email) }}">
        <input type="text" name="nome" placeholder="Nome" required><br>
        <input type="text" name="telefone" placeholder="Telefone" required><br>
        <textarea name="descricao" placeholder="Descrição" rows="5" required></textarea><br>
        <button type="submit" class="button">Próximo</button>
    </form>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p class="error">{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}
</body>
</html>
